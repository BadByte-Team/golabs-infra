apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/api-replicas.yaml
  - path: patches/ui-replicas.yaml

# Tag actualizado automáticamente por Jenkins CI
images:
  - name: gutsnet/golabs-api
    newTag: latest # golabs-api
  - name: gutsnet/golabs-ui
    newTag: latest # golabs-ui
  - name: gutsnet/golabs-static
    newTag: latest # golabs-static
