apiVersion: apps/v1
kind: Deployment
metadata:
  name: golabs-static
  namespace: golabs
  labels:
    app.kubernetes.io/name: golabs-static
    app.kubernetes.io/component: static-site
    app.kubernetes.io/part-of: golabs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: golabs-static
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golabs-static
        app.kubernetes.io/component: static-site
    spec:
      containers:
        - name: static
          image: gutsnet/golabs-static:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
