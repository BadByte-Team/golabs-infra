apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: golabs-api
  namespace: golabs
  labels:
    app.kubernetes.io/name: golabs-api
    app.kubernetes.io/part-of: golabs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: golabs-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
