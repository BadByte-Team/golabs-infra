apiVersion: apps/v1
kind: Deployment
metadata:
  name: golabs-ui
  namespace: golabs
  labels:
    app.kubernetes.io/name: golabs-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: golabs
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: golabs-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golabs-ui
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: gjisus/golabs-ui:latest
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: golabs-ui-nginx
