apiVersion: v1
kind: Service
metadata:
  name: golabs-db
  namespace: golabs
  labels:
    app.kubernetes.io/name: golabs-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: golabs
spec:
  type: ClusterIP
  clusterIP: None # Headless — permite DNS directo al pod
  selector:
    app.kubernetes.io/name: golabs-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
